<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Papers | Bhaskar Goswami</title>
  <link rel="stylesheet" href="/bhaskar-goswami-site/assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="bg-space-950 text-starlight-50 font-sans antialiased">

  <!-- Starfield background -->
  <div class="starfield" id="starfield" aria-hidden="true">
    <div class="starfield-layer-1" id="stars1"></div>
    <div class="starfield-layer-2" id="stars2"></div>
  </div>

  <!-- Shooting stars -->
  <div class="shooting-star-container" aria-hidden="true">
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
  </div>

  <!-- Navigation -->
  <header class="content-layer sticky top-0 z-50 backdrop-blur-md bg-space-900/70 border-b border-space-700/50">
    <div class="max-w-5xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
      <a href="/bhaskar-goswami-site/" class="text-lg md:text-xl font-bold tracking-tight hover:text-nebula-400 transition-colors duration-300">
        Dr. Bhaskar Goswami
      </a>
      <!-- Hamburger (mobile only) -->
      <button id="menu-btn" class="md:hidden p-2 rounded-lg text-starlight-200 hover:bg-space-800/50 transition-colors" aria-label="Toggle menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>
      <!-- Nav links -->
      <nav id="nav-links" class="hidden max-md:flex-col max-md:absolute max-md:top-full max-md:left-0 max-md:right-0 max-md:bg-space-900 max-md:border-b max-md:border-space-700/50 max-md:px-4 max-md:pb-4 md:flex md:items-center md:gap-1">
        <a href="/bhaskar-goswami-site/"
           class="px-3 py-2 rounded-lg text-sm font-medium transition-all duration-300
                  text-starlight-200 hover:text-starlight-50 hover:bg-space-800/50">
          Home
        </a>
        <a href="/bhaskar-goswami-site/about/"
           class="px-3 py-2 rounded-lg text-sm font-medium transition-all duration-300
                  text-starlight-200 hover:text-starlight-50 hover:bg-space-800/50">
          About
        </a>
        <a href="/bhaskar-goswami-site/research/"
           class="px-3 py-2 rounded-lg text-sm font-medium transition-all duration-300
                  text-starlight-200 hover:text-starlight-50 hover:bg-space-800/50">
          Research
        </a>
        <a href="/bhaskar-goswami-site/publications/"
           class="px-3 py-2 rounded-lg text-sm font-medium transition-all duration-300
                  text-starlight-200 hover:text-starlight-50 hover:bg-space-800/50">
          Publications
        </a>
        <a href="/bhaskar-goswami-site/cv/"
           class="px-3 py-2 rounded-lg text-sm font-medium transition-all duration-300
                  text-starlight-200 hover:text-starlight-50 hover:bg-space-800/50">
          CV
        </a>
      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main class="content-layer max-w-5xl mx-auto px-6 py-12">
    <section class="reveal p-8 rounded-xl bg-space-900 border border-space-700/50 text-center">
  <h2 class="text-2xl font-bold text-nebula-400 mb-4">Papers</h2>
  <p class="text-starlight-200">Coming soon &mdash; a collection of my research papers.</p>
</section>
  </main>

  <!-- Footer -->
  <footer class="content-layer border-t border-space-700/50 bg-space-900/50">
    <div class="max-w-5xl mx-auto px-6 py-8 text-center">
      <p class="text-starlight-400 text-sm">&copy; 2026 Bhaskar Goswami. All rights reserved.</p>
    </div>
  </footer>

  <!-- Inline JavaScript -->
  <script>
    (function() {
      // Mobile hamburger menu toggle
      var menuBtn = document.getElementById('menu-btn');
      var navLinks = document.getElementById('nav-links');
      if (menuBtn && navLinks) {
        menuBtn.addEventListener('click', function() {
          var isHidden = navLinks.classList.contains('hidden');
          if (isHidden) {
            navLinks.classList.remove('hidden');
            navLinks.classList.add('flex');
          } else {
            navLinks.classList.add('hidden');
            navLinks.classList.remove('flex');
          }
        });
      }

      // Starfield generator
      function generateStars(count, layerId, isDim, spread) {
        var el = document.getElementById(layerId);
        if (!el) return;
        var shadows = [];
        var color = isDim ? 'oklch(0.68 0.08 265)' : '#fff';
        for (var i = 0; i < count; i++) {
          var x = Math.floor(Math.random() * spread);
          var y = Math.floor(Math.random() * spread);
          shadows.push(x + 'px ' + y + 'px ' + color);
        }
        el.style.boxShadow = shadows.join(', ');
      }

      var spread = Math.max(window.innerWidth, window.innerHeight, 2000);
      generateStars(200, 'stars1', false, spread);
      generateStars(100, 'stars2', true, spread);

      // Scroll-reveal Intersection Observer
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('animate-fade-in-up');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.reveal').forEach(function(el) {
          observer.observe(el);
        });
      });
    })();
  </script>
</body>
</html>
